<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Color scheme for browser native elements (scrollbars, inputs, etc.) -->
    <meta name="color-scheme" content="light dark" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="neumanos" />
    <link rel="manifest" href="/images/favicon/site.webmanifest" />

    <!-- SEO Meta Tags -->
    <title>NeumanOS</title>
    <meta name="description" content="The ultimate management platform for your personal and professional life. Calendar, Kanban boards, weather, maps, and more - all powered by React + TypeScript." />
    <meta name="keywords" content="management platform, dashboard, task management, calendar, kanban, productivity, neumanos, react, typescript" />
    <meta name="author" content="Travis Neuman" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://os.neuman.dev" />
    <meta property="og:title" content="NeumanOS - Ultimate Management Platform" />
    <meta property="og:description" content="The ultimate management platform for your personal and professional life. Calendar, Kanban boards, weather, maps, and more." />
    <meta property="og:image" content="https://os.neuman.dev/images/og-image.png" />
    <meta property="og:image:alt" content="NeumanOS - Privacy-first productivity dashboard" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="NeumanOS" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://os.neuman.dev" />
    <meta name="twitter:title" content="NeumanOS - Ultimate Management Platform" />
    <meta name="twitter:description" content="The ultimate management platform for your personal and professional life." />
    <meta name="twitter:image" content="https://os.neuman.dev/images/og-image.png" />
    <meta name="twitter:image:alt" content="NeumanOS - Privacy-first productivity dashboard" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS (for map widget) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Leaflet JS (for map widget) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
  </body>
</html>
