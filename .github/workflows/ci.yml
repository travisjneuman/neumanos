name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        # Non-blocking: known transitive vulnerability in write-excel-file → archiver → minimatch
        # (ReDoS, not exploitable in browser context). Reports but doesn't fail the build.
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
