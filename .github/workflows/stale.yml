name: Close stale Dependabot PRs

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC

permissions:
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 25
          days-before-close: 5
          stale-pr-label: 'stale'
          stale-pr-message: >
            This Dependabot PR has been open for 25+ days without activity.
            It will be auto-closed in 5 days. Re-open or comment to keep it alive.
          close-pr-message: >
            Closed due to inactivity. Dependabot will re-create this PR
            if the update is still available on the next scheduled run.
          only-labels: 'dependencies'
          exempt-pr-labels: 'security,pinned'
